name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, Typecheck & API Security Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: selora
          POSTGRES_PASSWORD: selora_ci_password
          POSTGRES_DB: selora
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U selora"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://selora:selora_ci_password@localhost:5432/selora?schema=public

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Run migrations
        run: pnpm db:migrate:deploy

      - name: Run API security regression tests
        env:
          WEB_ORIGIN: http://localhost:3000
          SMTP_HOST: localhost
          SMTP_PORT: "1025"
          SMTP_FROM: noreply@selora.local
          API_SESSION_SECRET: ci-session-secret-change-in-prod
        run: pnpm --filter @selora/api test
