name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the sections below.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
      placeholder: When I do X, Y happens instead of Z.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Logs
      description: If applicable, add screenshots or paste error logs.

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - API
        - Core (Tenant App)
        - Console (Admin App)
        - Worker — Ingestion
        - Worker — Execution
        - Worker — AI Repair
        - CLI
        - Database / Prisma
        - Docker / Infrastructure
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version / Commit SHA
      placeholder: e.g., main@abc1234

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Node version, Docker version, browser, etc.
      placeholder: |
        - OS: macOS 15.3
        - Node: 20.11.0
        - Docker: 27.5.1
        - Browser: Chrome 130
